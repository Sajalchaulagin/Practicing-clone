<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Online Khabar</title>
</head>

<body>
    <div class="top-header">
        <div class="logo">
            <img src="img/main-logo-new.svg" alt="logo">
            <div class="date">२०८२-११-२७</div>
        </div>



        <div class="advertise">
            <img src="img/750x85_OK_desktopearpanel-ezgif.com-video-to-gif-converter.gif" alt="advertisement">
        </div>
    </div>

    <div class="election">
        <table class="bar_table">
            <thead>
                <tr>
                    <th>
                        पार्टीहरू</th>
                    <th>
                        अग्रता</th>
                    <th>
                        जित</th>
                    <th>
                        कुल सिट</th>
                    <th>
                        समानुपातिक मत</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="parties"><img
                            src="https://election.onlinekhabar.com/wp-content/uploads/2022/11/Ghanti.jpg" alt="ghanti">
                        <p>रास्वपा</p>
                    </td>
                    <td class="blue">
                        <div></div>
                    </td>
                    <td>125</td>
                    <td>125</td>
                    <td>5,161,289 <p>(47.80%)</p>
                    </td>
                </tr>
                <td class="parties"><img src="https://election.onlinekhabar.com/wp-content/uploads/2026/02/Congress.jpg"
                        alt="congress">
                    <p>कांग्रेस</p>
                </td>
                    <td class="green">
                        <div></div>
                    </td>
                <td>18</td>
                <td>18</td>
                <td>1,756,474 <p>(16.27%)</p>
                </td>
                </tr>
                <td class="parties"><img src="https://election.onlinekhabar.com/wp-content/uploads/2026/02/UML.jpg"
                        alt="yamale">
                    <p>एमाले</p>
                </td>
                    <td class="yellow">
                        <div></div>
                    </td>
                <td>9</td>
                <td>9</td>
                <td>1,453,140 <p>(13.46%)</p>
                </td>
                </tr>
                <td class="parties"><img
                        src="	https://election.onlinekhabar.com/wp-content/uploads/2026/02/Nepali-Communist-party.jpg"
                        alt="tara">
                    <p>नेकपा</p>
                </td>
                    <td class="red">
                        <div></div>
                    </td>
                <td>7</td>
                <td>7</td>
                <td>809,946 <p>(7.50%)</p>
                </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
